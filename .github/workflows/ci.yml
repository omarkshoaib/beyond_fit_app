name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        env:
          DATABASE_URL: sqlite:///./ci_test.db
          AUTH_SECRET_KEY: ci-test-secret-key-not-for-prod
        run: pytest -q

  mobile:
    name: Flutter (analyze + build web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install pub dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Build web bundle
        run: flutter build web --dart-define=API_BASE_URL=https://api.example.com/api/v1
